<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f0e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rutina">
<title>Rutina Mañana</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg: #0f0f0e; --surface: #1a1a18; --surface2: #232320; --border: #2e2e2a;
    --text: #e8e6df; --muted: #6b6960; --accent: #c8f060; --accent2: #60d4c8;
    --warn: #f0a060; --danger: #f06060; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px 48px; max-width: 420px; margin: 0 auto; }
  .mono { font-family: 'DM Mono', monospace; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
  .date-block .day { font-size: 13px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .date-block .greeting { font-size: 22px; font-weight: 600; color: var(--text); margin-top: 2px; }
  .streak-badge { display: flex; flex-direction: column; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 16px; min-width: 72px; }
  .streak-number { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: var(--accent); line-height: 1; }
  .streak-label { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: 0.06em; text-transform: uppercase; }
  .alarm-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .alarm-time { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 300; color: var(--text); }
  .alarm-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .alarm-status { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .alarm-toggle { position: relative; width: 44px; height: 26px; }
  .alarm-toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 13px; cursor: pointer; transition: background 0.2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: var(--muted); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
  .alarm-toggle input:checked + .toggle-slider { background: #1e2e10; border-color: var(--accent); }
  .alarm-toggle input:checked + .toggle-slider:before { transform: translateX(18px); background: var(--accent); }
  .time-edit-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .time-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 6px 10px; width: 90px; }
  .btn-small { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; padding: 6px 12px; cursor: pointer; transition: color 0.15s, border-color 0.15s; font-family: 'DM Sans', sans-serif; }
  .btn-small:hover { color: var(--text); border-color: var(--text); }
  .section-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 12px; margin-top: 8px; }
  .phase-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  .phase-title { font-size: 12px; color: var(--accent2); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .phase-next { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 6px; }
  .phase-bar-wrap { background: var(--surface2); border-radius: 3px; height: 3px; margin-top: 8px; }
  .phase-bar { height: 100%; background: var(--accent2); border-radius: 3px; transition: width 0.5s; }
  .exercise-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .exercise-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; transition: border-color 0.2s, background 0.2s; }
  .exercise-card.done { border-color: var(--accent); background: #161d0e; }
  .exercise-card.done .ex-name { color: var(--accent); }
  .ex-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .ex-icon { font-size: 20px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: var(--surface2); border-radius: 10px; flex-shrink: 0; }
  .ex-info { flex: 1; }
  .ex-name { font-size: 15px; font-weight: 500; color: var(--text); transition: color 0.2s; }
  .ex-detail { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .series-selector { display: flex; gap: 6px; }
  .series-btn { flex: 1; padding: 8px 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; text-align: center; -webkit-tap-highlight-color: transparent; }
  .series-btn:active { transform: scale(0.96); }
  .series-btn.selected { background: #161d0e; border-color: var(--accent); color: var(--accent); }
  .series-btn.selected-0 { background: var(--surface2); border-color: var(--border); color: var(--muted); }
  .timer-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
  .timer-display { font-family: 'DM Mono', monospace; font-size: 56px; font-weight: 300; text-align: center; color: var(--text); letter-spacing: -0.02em; line-height: 1; margin: 12px 0; }
  .timer-display.running { color: var(--accent); }
  .timer-display.stopped { color: var(--warn); }
  .timer-label { text-align: center; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .timer-message { text-align: center; font-size: 14px; font-weight: 500; color: var(--accent2); min-height: 20px; margin-bottom: 8px; transition: opacity 0.3s; }
  .timer-buttons { display: flex; gap: 10px; }
  .btn-timer { flex: 1; padding: 13px; border-radius: 12px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s, transform 0.1s; }
  .btn-timer:active { transform: scale(0.97); }
  .btn-start { background: var(--accent); color: #0f0f0e; }
  .btn-stop { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-reset { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .timer-best { text-align: center; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 12px; }
  .progress-wrap { background: var(--surface2); border-radius: 4px; height: 4px; margin: 10px 0; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width 1s linear; }
  .hang-history { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
  .hang-dot { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 6px; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); }
  .hang-dot.best { border-color: var(--accent); color: var(--accent); }
  .btn-confirm { width: 100%; padding: 18px; background: var(--accent); color: #0f0f0e; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-bottom: 12px; transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.02em; }
  .btn-confirm:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-confirm:not(:disabled):active { transform: scale(0.98); }
  .confirm-hint { text-align: center; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 24px; }
  .history-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 24px; }
  .history-day { aspect-ratio: 1; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); flex-direction: column; gap: 1px; cursor: default; }
  .history-day.completed { background: #161d0e; border-color: var(--accent); }
  .history-day.completed .hd-dot { background: var(--accent); }
  .history-day.missed { background: #1a0e0e; border-color: var(--danger); opacity: 0.6; }
  .history-day.rest { border-style: dashed; }
  .history-day.today { border-color: var(--accent2); color: var(--accent2); }
  .hd-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
  .hd-series { font-size: 8px; color: var(--accent); }
  .celebration { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .celebration.show { display: flex; }
  .cel-emoji { font-size: 64px; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { to { transform: translateY(-12px); } }
  .cel-text { font-size: 28px; font-weight: 600; color: var(--accent); text-align: center; }
  .cel-sub { font-size: 15px; color: var(--muted); text-align: center; font-family: 'DM Mono', monospace; }
  .btn-cel { background: var(--accent); color: #0f0f0e; border: none; border-radius: 12px; padding: 14px 32px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; font-family: 'DM Sans', sans-serif; }
  .notif-banner { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--surface); border: 1px solid var(--accent); border-radius: 14px; padding: 14px 20px; font-size: 14px; color: var(--accent); font-family: 'DM Mono', monospace; z-index: 200; white-space: nowrap; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); max-width: 90vw; text-align: center; }
  .notif-banner.show { transform: translateX(-50%) translateY(0); }
  .done-today-banner { background: #161d0e; border: 1px solid var(--accent); border-radius: var(--radius); padding: 20px; text-align: center; margin-bottom: 20px; }
  .done-today-banner .big { font-size: 40px; margin-bottom: 8px; }
  .done-today-banner .msg { font-size: 16px; font-weight: 500; color: var(--accent); }
  .done-today-banner .sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<div class="celebration" id="celebration">
  <div class="cel-emoji">💪</div>
  <div class="cel-text">¡Hecho!</div>
  <div class="cel-sub" id="cel-streak-text">Racha: 1 día</div>
  <button class="btn-cel" onclick="closeCelebration()">Cerrar</button>
</div>

<div class="notif-banner" id="notif-banner"></div>

<div class="header">
  <div class="date-block">
    <div class="day mono" id="current-day">—</div>
    <div class="greeting" id="greeting">Buenos días</div>
  </div>
  <div class="streak-badge">
    <div class="streak-number mono" id="streak-display">0</div>
    <div class="streak-label">racha</div>
  </div>
</div>

<div class="alarm-card">
  <div style="flex:1">
    <div class="alarm-time mono" id="alarm-display">08:00</div>
    <div class="time-edit-row">
      <input type="time" class="time-input" id="alarm-input" value="08:00">
      <button class="btn-small" onclick="saveAlarm()">Guardar</button>
    </div>
  </div>
  <div class="alarm-right">
    <div class="alarm-status mono" id="alarm-status-text">Activa</div>
    <label class="alarm-toggle">
      <input type="checkbox" id="alarm-toggle" checked onchange="toggleAlarm()">
      <span class="toggle-slider"></span>
    </label>
  </div>
</div>

<div id="main-content">
  <div class="done-today-banner" id="done-banner" style="display:none">
    <div class="big">✅</div>
    <div class="msg">Rutina completada hoy</div>
    <div class="sub" id="done-time-text">—</div>
  </div>

  <div class="phase-card" id="phase-card">
    <div class="phase-title" id="phase-title">Semana 1 — fase inicial</div>
    <div id="phase-desc" style="font-size:13px;color:var(--text)">Consolida el hábito</div>
    <div class="phase-next" id="phase-next"></div>
    <div class="phase-bar-wrap"><div class="phase-bar" id="phase-bar" style="width:0%"></div></div>
  </div>

  <div class="timer-section" id="timer-section">
    <div class="section-title">Dead hang — cronómetro</div>
    <div class="timer-label" id="timer-label-text">LISTO PARA COLGAR</div>
    <div class="timer-message" id="timer-message"></div>
    <div class="timer-display mono" id="timer-display">0:00</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="timer-progress" style="width:0%"></div>
    </div>
    <div class="timer-best">Hoy: <span id="today-hang-display">—</span> &nbsp;·&nbsp; Mejor: <span id="best-time-display">—</span> &nbsp;·&nbsp; Objetivo: <span style="color:var(--warn)">2:00</span></div>
    <div class="hang-history" id="hang-history"></div>
    <div class="timer-buttons" style="margin-top:16px">
      <button class="btn-timer btn-start" id="btn-start" onclick="startTimer()">Iniciar</button>
      <button class="btn-timer btn-stop" id="btn-stop" onclick="stopTimer()" style="display:none">Parar</button>
      <button class="btn-timer btn-reset" onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <div class="section-title">Ejercicios del día</div>
  <div class="exercise-list" id="exercise-list"></div>

  <button class="btn-confirm" id="btn-confirm" onclick="confirmWorkout()" disabled>
    Confirmar rutina completa
  </button>
  <div class="confirm-hint" id="confirm-hint">Selecciona las series de cada ejercicio</div>
</div>

<div class="section-title" style="margin-top:8px">Últimas 4 semanas</div>
<div class="history-grid" id="history-grid"></div>

<script>
const STORAGE_KEY = 'rutina_v4';

const PHASES = [
  { weeks:[1,2,3],      label:'Fase 1 — base',       desc:'Consolida el hábito',         flex:'hasta 3 × 10-12', squat:'hasta 3 × 15-20', rotation:'hasta 2 × 15' },
  { weeks:[4,5],        label:'Fase 2 — volumen',     desc:'Más series, pausa abajo',     flex:'4 × 12-15',       squat:'3 × 15-20 + pausa', rotation:'2 × 15' },
  { weeks:[6,7,8],      label:'Fase 3 — intensidad',  desc:'Series completas',            flex:'4 × 15',          squat:'4 × 20', rotation:'3 × 15' },
  { weeks:[9,10,11,12], label:'Fase 4 — avanzado',    desc:'Variantes más duras',         flex:'4 × 12 pies elev.', squat:'3 × 12 búlgara', rotation:'3 × 15' },
];

const MESSAGES = [
  { sec:15, msg:'¡Bien! Sigue...' },
  { sec:30, msg:'¡30 segundos! 💪' },
  { sec:45, msg:'¡Aguanta!' },
  { sec:60, msg:'¡1 minuto! Mitad del objetivo' },
  { sec:75, msg:'¡Casi! Empuja un poco más' },
  { sec:90, msg:'¡90 segundos! Estás muy cerca' },
  { sec:105, msg:'¡15 segundos para el objetivo!' },
  { sec:120, msg:'🎯 ¡2 MINUTOS! ¡OBJETIVO!' },
];

function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let state = loadState();
if (!state.log)       state.log = {};
if (!state.bestHang)  state.bestHang = 0;
if (!state.alarmTime) state.alarmTime = '08:00';
if (!state.alarmOn)   state.alarmOn = true;
if (!state.startDate) state.startDate = null;
if (!state.hangLog)   state.hangLog = {};

function localNow() { return new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Madrid' })); }
function toDateKey(d) { return new Date(d).toLocaleDateString('en-CA', { timeZone: 'Europe/Madrid' }); }
function today() { return toDateKey(new Date()); }
function isWeekend(d) { return [0,6].includes(new Date(new Date(d).toLocaleString('en-US',{timeZone:'Europe/Madrid'})).getDay()); }

function getWeekNumber() {
  if (!state.startDate) return 1;
  const diff = Math.floor((new Date() - new Date(state.startDate)) / 86400000);
  return Math.min(Math.floor(diff / 7) + 1, 12);
}
function getCurrentPhase() { const w = getWeekNumber(); return PHASES.find(p => p.weeks.includes(w)) || PHASES[PHASES.length-1]; }

function calculateStreak() {
  let streak = 0;
  const d = new Date();
  const todayKey = today();
  while (true) {
    const key = toDateKey(d);
    if (isWeekend(d)) { d.setDate(d.getDate()-1); continue; }
    if (key === todayKey && !(state.log[key] && state.log[key].confirmed)) { d.setDate(d.getDate()-1); continue; }
    if (state.log[key] && state.log[key].confirmed) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function checkMissedDays() {
  if (!state.startDate) return;
  const d = new Date(); d.setDate(d.getDate()-1);
  for (let i = 0; i < 28; i++) {
    const key = toDateKey(d);
    if (!isWeekend(d) && new Date(d) >= new Date(state.startDate) && state.log[key] === undefined) {
      state.log[key] = { missed: true };
    }
    d.setDate(d.getDate()-1);
  }
}

// ── WAKE LOCK ────────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// ── TIMER ────────────────────────────────────────────────────
let timerInterval = null, timerSeconds = 0, timerRunning = false;
const TARGET = 120;

function formatTime(s) { return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  requestWakeLock();
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'block';
  document.getElementById('timer-display').className = 'timer-display mono running';
  document.getElementById('timer-label-text').textContent = 'COLGANDO...';
  document.getElementById('timer-message').textContent = '';
  timerInterval = setInterval(() => {
    timerSeconds++;
    updateTimerDisplay();
    const msg = MESSAGES.find(m => m.sec === timerSeconds);
    if (msg) {
      document.getElementById('timer-message').textContent = msg.msg;
      if (timerSeconds >= TARGET) { stopTimer(); return; }
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval); timerRunning = false;
  releaseWakeLock();
  document.getElementById('btn-start').style.display = 'block';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('timer-display').className = 'timer-display mono stopped';
  document.getElementById('timer-label-text').textContent = 'PARADO — ' + formatTime(timerSeconds);

  if (timerSeconds > state.bestHang) { state.bestHang = timerSeconds; }
  const todayKey = today();
  const prev = state.hangLog[todayKey] || 0;
  if (timerSeconds > prev) { state.hangLog[todayKey] = timerSeconds; }
  saveState(state);
  updateTimerInfo();

  if (timerSeconds >= 10) {
    setSeries('hang', 1);
  }
}

function resetTimer() {
  clearInterval(timerInterval); timerRunning = false; timerSeconds = 0;
  releaseWakeLock();
  document.getElementById('btn-start').style.display = 'block';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('timer-display').className = 'timer-display mono';
  document.getElementById('timer-label-text').textContent = 'LISTO PARA COLGAR';
  document.getElementById('timer-message').textContent = '';
  updateTimerDisplay();
}

function updateTimerDisplay() {
  document.getElementById('timer-display').textContent = formatTime(timerSeconds);
  document.getElementById('timer-progress').style.width = Math.min(100,(timerSeconds/TARGET)*100) + '%';
}

function updateTimerInfo() {
  const todayKey = today();
  document.getElementById('today-hang-display').textContent = state.hangLog[todayKey] ? formatTime(state.hangLog[todayKey]) : '—';
  document.getElementById('best-time-display').textContent = state.bestHang > 0 ? formatTime(state.bestHang) : '—';

  const hist = document.getElementById('hang-history');
  hist.innerHTML = '';
  const keys = Object.keys(state.hangLog).sort().slice(-7);
  keys.forEach(k => {
    const v = state.hangLog[k];
    const dot = document.createElement('div');
    dot.className = 'hang-dot' + (v === state.bestHang ? ' best' : '');
    const d = new Date(k); dot.textContent = (d.getDate()) + '/' + (d.getMonth()+1) + ' ' + formatTime(v);
    hist.appendChild(dot);
  });
}

// ── SERIES SELECTOR ──────────────────────────────────────────
let seriesData = {};

function getExercises(phase) {
  return [
    { id:'hang',     name:'Dead hang',       detail:'1 serie · objetivo 2:00', icon:'🧗', maxSeries:1 },
    { id:'flex',     name:'Flexiones',       detail:phase.flex,                icon:'💪', maxSeries:3 },
    { id:'squat',    name:'Sentadillas',     detail:phase.squat,               icon:'🏋️', maxSeries:3 },
    { id:'rotation', name:'Rotación hombro', detail:phase.rotation,            icon:'🔄', maxSeries:3 },
  ];
}

function setSeries(id, n) {
  const todayKey = today();
  if (!state.log[todayKey]) state.log[todayKey] = { series: {} };
  if (!state.log[todayKey].series) state.log[todayKey].series = {};
  state.log[todayKey].series[id] = n;
  seriesData[id] = n;
  saveState(state);
  updateSeriesUI(id, n);
  updateConfirmButton();
}

function updateSeriesUI(id, n) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  if (n > 0) card.classList.add('done'); else card.classList.remove('done');
  const btns = card.querySelectorAll('.series-btn');
  btns.forEach((btn, i) => {
    btn.classList.toggle('selected', i+1 === n);
  });
}

function renderExercises() {
  const todayKey = today();
  seriesData = (state.log[todayKey] && state.log[todayKey].series) || {};
  const phase = getCurrentPhase();
  const exercises = getExercises(phase);
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';

  exercises.forEach(ex => {
    const n = seriesData[ex.id] || 0;
    const card = document.createElement('div');
    card.className = 'exercise-card' + (n > 0 ? ' done' : '');
    card.id = 'card-' + ex.id;

    const maxS = ex.maxSeries;
    let btns = '';
    for (let i = 1; i <= maxS; i++) {
      btns += `<button class="series-btn${n===i?' selected':''}" onclick="setSeries('${ex.id}',${i})">${i} serie${i>1?'s':''}</button>`;
    }

    card.innerHTML = `
      <div class="ex-top">
        <div class="ex-icon">${ex.icon}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-detail mono">${ex.detail}</div>
        </div>
      </div>
      <div class="series-selector">${btns}</div>
    `;
    list.appendChild(card);
  });
  updateConfirmButton();
}

function updateConfirmButton() {
  const todayKey = today();
  const alreadyConfirmed = state.log[todayKey] && state.log[todayKey].confirmed;
  const btn = document.getElementById('btn-confirm');
  const hint = document.getElementById('confirm-hint');

  if (alreadyConfirmed) {
    btn.disabled = true; btn.textContent = '✓ Completado'; hint.textContent = ''; return;
  }

  const phase = getCurrentPhase();
  const exercises = getExercises(phase);
  const pending = exercises.filter(ex => !seriesData[ex.id]).length;

  if (pending === 0) {
    btn.disabled = false; hint.textContent = '¡Todo listo!';
  } else {
    btn.disabled = true;
    hint.textContent = `Faltan ${pending} ejercicio${pending>1?'s':''}`;
  }
}

// ── CONFIRM ──────────────────────────────────────────────────
function confirmWorkout() {
  const todayKey = today();
  if (!state.log[todayKey]) state.log[todayKey] = { series: {} };
  state.log[todayKey].confirmed = true;
  state.log[todayKey].time = localNow().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  if (!state.startDate) state.startDate = todayKey;
  const streak = calculateStreak();
  saveState(state);
  document.getElementById('cel-streak-text').textContent = 'Racha: ' + streak + ' día' + (streak!==1?'s':'');
  document.getElementById('streak-display').textContent = streak;
  document.getElementById('celebration').classList.add('show');
  showDoneToday();
  renderHistory();
  renderPhase();
}

function closeCelebration() { document.getElementById('celebration').classList.remove('show'); }

function showDoneToday() {
  const entry = state.log[today()];
  if (entry && entry.confirmed) {
    document.getElementById('done-banner').style.display = 'block';
    document.getElementById('done-time-text').textContent = 'Completado a las ' + (entry.time||'—');
    document.getElementById('btn-confirm').disabled = true;
    document.getElementById('btn-confirm').textContent = '✓ Completado';
    document.getElementById('confirm-hint').textContent = '';
  }
}

// ── PHASE UI ─────────────────────────────────────────────────
function renderPhase() {
  const week = getWeekNumber();
  const phase = getCurrentPhase();
  const phaseIdx = PHASES.indexOf(phase);
  const nextPhase = PHASES[phaseIdx+1];
  const weekInPhase = phase.weeks.indexOf(week) + 1;
  const pct = Math.round((weekInPhase / phase.weeks.length) * 100);
  document.getElementById('phase-title').textContent = `Semana ${week} — ${phase.label}`;
  document.getElementById('phase-desc').textContent = phase.desc;
  document.getElementById('phase-bar').style.width = pct + '%';
  if (nextPhase) {
    const weeksLeft = phase.weeks[phase.weeks.length-1] - week;
    document.getElementById('phase-next').textContent = weeksLeft > 0
      ? `Próxima fase en ${weeksLeft} semana${weeksLeft>1?'s':''}`
      : 'Próxima semana cambias de fase';
  } else {
    document.getElementById('phase-next').textContent = '¡Fase avanzada alcanzada!';
  }
}

// ── ALARM ────────────────────────────────────────────────────
function saveAlarm() {
  const val = document.getElementById('alarm-input').value;
  if (!val) return;
  state.alarmTime = val;
  saveState(state);
  document.getElementById('alarm-display').textContent = val;
  showNotif('Alarma guardada para las ' + val);
}
function toggleAlarm() {
  state.alarmOn = document.getElementById('alarm-toggle').checked;
  saveState(state);
  document.getElementById('alarm-status-text').textContent = state.alarmOn ? 'Activa' : 'Desactivada';
}
let alarmFired = false;
function checkAlarm() {
  if (!state.alarmOn || alarmFired) return;
  const now = localNow();
  const hhmm = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  if (hhmm === state.alarmTime && !isWeekend(now)) {
    if (!state.log[today()] || !state.log[today()].confirmed) {
      showNotif('⏰ ' + state.alarmTime + ' — ¡Hora de la rutina!');
      alarmFired = true;
      setTimeout(() => { alarmFired = false; }, 70000);
    }
  }
}

// ── HISTORY ──────────────────────────────────────────────────
function renderHistory() {
  const grid = document.getElementById('history-grid');
  grid.innerHTML = '';
  const todayKey = today();
  const d = new Date(); d.setDate(d.getDate()-27);
  for (let i = 0; i < 28; i++) {
    const key = toDateKey(d);
    const weekend = isWeekend(d);
    const isToday = key === todayKey;
    const entry = state.log[key];
    const confirmed = entry && entry.confirmed;
    const missed = entry && entry.missed;
    const series = confirmed && entry.series ? Object.values(entry.series).reduce((a,b)=>a+b,0) : 0;
    const hang = state.hangLog[key];

    const el = document.createElement('div');
    let cls = 'history-day';
    if (weekend) cls += ' rest';
    else if (confirmed) cls += ' completed';
    else if (missed) cls += ' missed';
    else if (isToday) cls += ' today';
    el.className = cls;

    let inner = `<span style="font-size:9px">${d.getDate()}</span><div class="hd-dot"></div>`;
    if (confirmed && hang) inner += `<span class="hd-series">${formatTime(hang)}</span>`;
    el.innerHTML = inner;
    grid.appendChild(el);
    d.setDate(d.getDate()+1);
  }
}

// ── HEADER ───────────────────────────────────────────────────
function updateHeader() {
  const now = localNow();
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  document.getElementById('current-day').textContent = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
  const h = now.getHours();
  document.getElementById('greeting').textContent = h < 14 ? 'Buenos días' : h < 21 ? 'Buenas tardes' : 'Buenas noches';
  if (isWeekend(now)) {
    document.getElementById('timer-section').style.opacity = '0.5';
    document.getElementById('exercise-list').style.opacity = '0.5';
    document.getElementById('btn-confirm').disabled = true;
    document.getElementById('confirm-hint').textContent = 'Fin de semana — día de descanso';
  }
}

function showNotif(msg) {
  const el = document.getElementById('notif-banner');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

// ── INIT ─────────────────────────────────────────────────────
function init() {
  checkMissedDays();
  updateHeader();
  renderPhase();
  document.getElementById('streak-display').textContent = calculateStreak();
  document.getElementById('alarm-display').textContent = state.alarmTime;
  document.getElementById('alarm-input').value = state.alarmTime;
  document.getElementById('alarm-toggle').checked = state.alarmOn;
  document.getElementById('alarm-status-text').textContent = state.alarmOn ? 'Activa' : 'Desactivada';
  updateTimerInfo();
  renderExercises();
  showDoneToday();
  renderHistory();
  setInterval(checkAlarm, 15000);
}

init();
</script>
